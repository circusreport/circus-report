<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIRCUS REPORT</title>
  <meta name="description" content="Making sense of the circus we call media, politics, and culture.">
  <meta property="og:title" content="Circus Report">
  <meta property="og:description" content="Making sense of the circus we call media, politics, and culture.">
  <meta property="og:image" content="https://circus-report.pages.dev/circusreport.svg">
  <meta property="og:url" content="https://circus-report.pages.dev">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #000000;
    }

    /* ── Header ── */
    header {
      background: #ffffff;
      text-align: center;
      padding: 16px 20px;
      border-bottom: 4px solid #cc0000;
    }

    header h1 {
      font-size: 2.8em;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-family: Georgia, serif;
      color: #000000;
    }

    header p.tagline {
      font-size: 1em;
      color: #444444;
      margin-top: 6px;
    }

    /* ── Container ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ══════════════════════════════════════
       HERO: top story (left 50%) + 2x2 (right 50%)
    ══════════════════════════════════════ */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
      margin-bottom: 0;
      align-items: stretch;
    }

    .top-story {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .top-story a.img-link {
      display: block;
      flex: 1;
    }

    .top-story img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .top-story .no-image {
      width: 100%;
      flex: 1;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.85em;
    }

    .top-story a.headline {
      font-size: 1.4em;
      font-weight: bold;
      color: #cc0000;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      text-wrap: balance;
      margin-top: 8px;
      text-align: center;
    }

    .top-story a.headline:hover { text-decoration: underline; }

    /* 2x2 grid right side */
    .sub-grid-2x2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .sub-card {
      display: flex;
      flex-direction: column;
    }

    .sub-card a.img-link { display: block; }

    .sub-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .sub-card .no-image {
      width: 100%;
      height: 140px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.75em;
    }

    .sub-card a.headline {
      font-size: 0.9em;
      font-weight: bold;
      color: #000080;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      text-align: center;
      text-wrap: balance;
      margin-top: 6px;
    }

    .sub-card a.headline:hover { text-decoration: underline; }
    .sub-card a.headline:visited { color: #551a8b; }

    /* ══════════════════════════════════════
       ROW OF 6 — smaller images
    ══════════════════════════════════════ */
    .sub-row-6 {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      border-top: 2px solid #cc0000;
      border-bottom: 2px solid #cccccc;
      padding: 16px 0;
      margin-top: 16px;
      margin-bottom: 20px;
    }

    .sub-row-card {
      display: flex;
      flex-direction: column;
    }

    .sub-row-card a.img-link { display: block; }

    .sub-row-card img {
      width: 100%;
      height: 90px;
      object-fit: cover;
      display: block;
    }

    .sub-row-card .no-image {
      width: 100%;
      height: 90px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.7em;
    }

    .sub-row-card a.headline {
      font-size: 0.8em;
      font-weight: bold;
      color: #000080;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      text-align: center;
      text-wrap: balance;
      margin-top: 5px;
    }

    .sub-row-card a.headline:hover { text-decoration: underline; }
    .sub-row-card a.headline:visited { color: #551a8b; }

    /* ══════════════════════════════════════
       TEXT LINKS — 3 columns
    ══════════════════════════════════════ */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px 30px;
    }

    .link-item {
      margin-bottom: 0;
    }

    .link-item a {
      font-size: 1em;
      color: #000080;
      text-decoration: none;
      display: block;
      padding-left: 1.4em;
      text-indent: -1.4em;
    }

    .link-item a:hover { text-decoration: underline; }
    .link-item a:visited { color: #551a8b; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.75em;
      color: #888888;
      border-top: 2px solid #000000;
      margin-top: 40px;
    }

    /* ══════════════════════════════════════
       MOBILE
    ══════════════════════════════════════ */
    @media (max-width: 768px) {
      header h1 { font-size: 1.8em; letter-spacing: 3px; }
      header p.tagline { font-size: 0.85em; }

      /* Hero: top story full width, then 2x2 below */
      .hero {
        grid-template-columns: 1fr;
      }

      .top-story img,
      .top-story .no-image {
        height: 220px;
        flex: none;
      }

      .top-story a.headline { font-size: 1.1em; }

      .sub-grid-2x2 {
        grid-template-columns: 1fr 1fr;
      }

      .sub-card img,
      .sub-card .no-image {
        height: 110px;
      }

      /* Row of 6: 2 columns of image cards on mobile */
      .sub-row-6 {
        grid-template-columns: 1fr 1fr;
      }

      .sub-row-card img,
      .sub-row-card .no-image {
        height: 100px;
      }

      .sub-row-card a.headline {
        font-size: 0.85em;
      }

      /* Text links: 2 columns on mobile */
      .links-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <h1>CIRCUS REPORT</h1>
    <p class="tagline">Making sense of the circus we call media, politics, and culture.</p>
  </header>

  <div class="container">

    <!-- Hero: top story + 2x2 -->
    <div class="hero">
      <div class="top-story" id="top-story"></div>
      <div class="sub-grid-2x2" id="sub-grid-2x2"></div>
    </div>

    <!-- Row of 6 -->
    <div class="sub-row-6" id="sub-row-6"></div>

    <!-- Text links -->
    <div class="links-grid" id="links-grid"></div>

  </div>

  <footer>
    <p>Updated throughout the day</p>
    <p id="last-updated"></p>
  </footer>

  <script>
    fetch('https://news-worker.circusreportnews.workers.dev/links')
      .then(response => response.json())
      .then(data => {
        document.getElementById('last-updated').textContent =
          'Last updated: ' + new Date(data.lastUpdated).toLocaleString();

        const links = data.links;

        // ── Index 0: Top story ──
        if (links.length > 0) {
          const top = links[0];
          const topDiv = document.getElementById('top-story');
          if (top.image) {
            const imgLink = document.createElement('a');
            imgLink.href = top.url;
            imgLink.target = '_blank';
            imgLink.className = 'img-link';
            const img = document.createElement('img');
            img.src = top.image;
            img.alt = top.headline;
            imgLink.appendChild(img);
            topDiv.appendChild(imgLink);
          } else {
            const placeholder = document.createElement('div');
            placeholder.className = 'no-image';
            placeholder.textContent = 'No image';
            topDiv.appendChild(placeholder);
          }
          const link = document.createElement('a');
          link.href = top.url;
          link.target = '_blank';
          link.className = 'headline';
          link.textContent = top.headline;
          topDiv.appendChild(link);
        }

        // ── Indices 1-4: 2x2 sub-headlines ──
        const subGrid = document.getElementById('sub-grid-2x2');
        links.slice(1, 5).forEach(item => {
          const card = document.createElement('div');
          card.className = 'sub-card';
          if (item.image) {
            const imgLink = document.createElement('a');
            imgLink.href = item.url;
            imgLink.target = '_blank';
            imgLink.className = 'img-link';
            const img = document.createElement('img');
            img.src = item.image;
            img.alt = item.headline;
            imgLink.appendChild(img);
            card.appendChild(imgLink);
          } else {
            const placeholder = document.createElement('div');
            placeholder.className = 'no-image';
            placeholder.textContent = 'No image';
            card.appendChild(placeholder);
          }
          const link = document.createElement('a');
          link.href = item.url;
          link.target = '_blank';
          link.className = 'headline';
          link.textContent = item.headline;
          card.appendChild(link);
          subGrid.appendChild(card);
        });

        // ── Indices 5-10: row of 6 ──
        const subRow = document.getElementById('sub-row-6');
        links.slice(5, 11).forEach(item => {
          const card = document.createElement('div');
          card.className = 'sub-row-card';
          if (item.image) {
            const imgLink = document.createElement('a');
            imgLink.href = item.url;
            imgLink.target = '_blank';
            imgLink.className = 'img-link';
            const img = document.createElement('img');
            img.src = item.image;
            img.alt = item.headline;
            imgLink.appendChild(img);
            card.appendChild(imgLink);
          } else {
            const placeholder = document.createElement('div');
            placeholder.className = 'no-image';
            placeholder.textContent = 'No image';
            card.appendChild(placeholder);
          }
          const link = document.createElement('a');
          link.href = item.url;
          link.target = '_blank';
          link.className = 'headline';
          link.textContent = item.headline;
          card.appendChild(link);
          subRow.appendChild(card);
        });

        // ── Index 11+: text links ──
        const grid = document.getElementById('links-grid');
        links.slice(11).forEach(item => {
          const div = document.createElement('div');
          div.className = 'link-item';
          const prefix = item.emoji ? item.emoji : '&#9654;';
          div.innerHTML = '<a href="' + item.url + '" target="_blank">' + prefix + ' ' + item.headline + '</a>';
          grid.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('top-story').innerHTML =
          '<p>No links yet. Check back soon.</p>';
      });
  </script>

</body>
</html>
