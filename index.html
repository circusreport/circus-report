<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIRCUS REPORT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #000000;
    }

    header {
      background: #ffffff;
      color: #000000;
      text-align: center;
      padding: 20px;
      border-bottom: 4px solid #cc0000;
    }

    header img.banner {
      max-width: 400px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    header p.tagline {
      font-size: 1.2em;
      color: #444444;
      margin-top: 10px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Hero: top story (left 60%) + sub-headlines (right 40%) */
    .hero {
      display: grid;
      grid-template-columns: 60% 40%;
      gap: 20px;
      border-bottom: 2px solid #cc0000;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    /* Left: top story */
    .top-story {
      display: flex;
      flex-direction: column;
    }

    .top-story a.img-link {
      display: block;
    }

    .top-story img {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      display: block;
    }

    .top-story a.headline {
      font-size: 1.7em;
      font-weight: bold;
      color: #cc0000;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      text-wrap: balance;
      margin-top: 10px;
    }

    .top-story a.headline:hover { text-decoration: underline; }

    /* Right: sub-headlines stacked */
    .sub-headlines {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sub-card {
      display: flex;
      flex-direction: row;
      gap: 10px;
      align-items: flex-start;
      border-bottom: 1px solid #eeeeee;
      padding-bottom: 12px;
    }

    .sub-card:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .sub-card a.img-link {
      display: block;
      flex-shrink: 0;
    }

    .sub-card img {
      width: 110px;
      height: 80px;
      object-fit: cover;
      display: block;
    }

    .sub-card .no-image {
      width: 110px;
      height: 80px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.75em;
      flex-shrink: 0;
    }

    .sub-card a.headline {
      font-size: 0.95em;
      font-weight: bold;
      color: #000080;
      text-decoration: none;
      line-height: 1.4;
      display: block;
      text-wrap: balance;
    }

    .sub-card a.headline:hover { text-decoration: underline; }
    .sub-card a.headline:visited { color: #551a8b; }

    /* Text links grid */
    .links-grid {
      columns: 2;
      column-gap: 40px;
    }

    .link-item {
      break-inside: avoid;
      margin-bottom: 10px;
    }

    .link-item a {
      font-size: 1.05em;
      color: #000080;
      text-decoration: none;
    }

    .link-item a:hover { text-decoration: underline; }
    .link-item a:visited { color: #551a8b; }

    .divider {
      border: none;
      border-top: 1px solid #cccccc;
      margin: 20px 0;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.75em;
      color: #888888;
      border-top: 2px solid #000000;
      margin-top: 40px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .top-story a.headline {
        font-size: 1.3em;
      }

      /* Sub-headlines: 2-column image grid on mobile */
      .sub-headlines {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .sub-card {
        flex-direction: column;
        border-bottom: none;
        padding-bottom: 0;
      }

      .sub-card a.img-link {
        width: 100%;
      }

      .sub-card img,
      .sub-card .no-image {
        width: 100%;
        height: 100px;
      }

      .sub-card a.headline {
        font-size: 0.9em;
        margin-top: 5px;
      }

      .links-grid { columns: 1; }
    }
  </style>
</head>
<body>

  <header>
    <img class="banner" src="circusreport.svg" alt="Circus Report">
    <p class="tagline">Making sense of the circus we call media, politics, and culture.</p>
  </header>

  <div class="container">
    <div class="hero">
      <div class="top-story" id="top-story"></div>
      <div class="sub-headlines" id="sub-headlines"></div>
    </div>
    <hr class="divider">
    <div class="links-grid" id="links-grid"></div>
  </div>

  <footer>
    <p>Updated throughout the day</p>
    <p id="last-updated"></p>
  </footer>

  <script>
    fetch('https://news-worker.circusreportnews.workers.dev/links')
      .then(response => response.json())
      .then(data => {
        document.getElementById('last-updated').textContent =
          'Last updated: ' + new Date(data.lastUpdated).toLocaleString();

        const links = data.links;

        // Top story
        if (links.length > 0) {
          const top = links[0];
          const topDiv = document.getElementById('top-story');
          if (top.image) {
            const imgLink = document.createElement('a');
            imgLink.href = top.url;
            imgLink.target = '_blank';
            imgLink.className = 'img-link';
            const img = document.createElement('img');
            img.src = top.image;
            img.alt = top.headline;
            imgLink.appendChild(img);
            topDiv.appendChild(imgLink);
          }
          const link = document.createElement('a');
          link.href = top.url;
          link.target = '_blank';
          link.className = 'headline';
          link.textContent = top.headline;
          topDiv.appendChild(link);
        }

        // Sub-headlines (positions 2-4)
        const subDiv = document.getElementById('sub-headlines');
        links.slice(1, 4).forEach(item => {
          const card = document.createElement('div');
          card.className = 'sub-card';

          if (item.image) {
            const imgLink = document.createElement('a');
            imgLink.href = item.url;
            imgLink.target = '_blank';
            imgLink.className = 'img-link';
            const img = document.createElement('img');
            img.src = item.image;
            img.alt = item.headline;
            imgLink.appendChild(img);
            card.appendChild(imgLink);
          } else {
            const placeholder = document.createElement('div');
            placeholder.className = 'no-image';
            placeholder.textContent = 'No image';
            card.appendChild(placeholder);
          }

          const link = document.createElement('a');
          link.href = item.url;
          link.target = '_blank';
          link.className = 'headline';
          link.textContent = item.headline;
          card.appendChild(link);
          subDiv.appendChild(card);
        });

        // Text links (position 5+)
        const grid = document.getElementById('links-grid');
        links.slice(4).forEach(item => {
          const div = document.createElement('div');
          div.className = 'link-item';
          const prefix = item.emoji ? item.emoji : '&#9654;';
          div.innerHTML = '<a href="' + item.url + '" target="_blank">' + prefix + ' ' + item.headline + '</a>';
          grid.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('top-story').innerHTML =
          '<p>No links yet. Check back soon.</p>';
      });
  </script>

</body>
</html>
