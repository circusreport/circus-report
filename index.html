<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIRCUS REPORT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #000000;
    }

    header {
      background: #ffffff;
      color: #000000;
      text-align: center;
      padding: 20px;
      border-bottom: 4px solid #cc0000;
    }

    header img.banner {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    header p.tagline {
      font-size: 0.85em;
      color: #444444;
      margin-top: 10px;
    }

    header p#last-updated {
      font-size: 0.75em;
      color: #888888;
      margin-top: 4px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .top-story {
      text-align: center;
      border-bottom: 2px solid #cc0000;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .top-story img {
      width: 100%;
      max-height: 450px;
      object-fit: cover;
      margin-bottom: 15px;
      display: block;
    }

    .top-story a {
      font-size: 2em;
      font-weight: bold;
      color: #cc0000;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      text-wrap: balance;
    }

    .top-story a:hover { text-decoration: underline; }

    .image-columns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 2px solid #cccccc;
    }

    .image-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      margin-bottom: 8px;
    }

    .image-card .no-image {
      width: 100%;
      height: 180px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      color: #999;
      font-size: 0.85em;
    }

    .image-card a {
      font-size: 1.05em;
      font-weight: bold;
      color: #000080;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      text-align: center;
      text-wrap: balance;
    }

    .image-card a:hover { text-decoration: underline; }
    .image-card a:visited { color: #551a8b; }

    .links-grid {
      columns: 2;
      column-gap: 40px;
    }

    .link-item {
      break-inside: avoid;
      margin-bottom: 10px;
    }

    .link-item a {
      font-size: 1.05em;
      color: #000080;
      text-decoration: none;
    }

    .link-item a:hover { text-decoration: underline; }
    .link-item a:visited { color: #551a8b; }

    .divider {
      border: none;
      border-top: 1px solid #cccccc;
      margin: 20px 0;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.75em;
      color: #888888;
      border-top: 2px solid #000000;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .image-columns { grid-template-columns: 1fr; }
      .links-grid { columns: 1; }
      .top-story a { font-size: 1.3em; }
    }
  </style>
</head>
<body>

  <header>
    <img class="banner" src="circusreport.svg" alt="Circus Report">
    <p class="tagline">Making sense of the circus we call media, politics, and culture.</p>
    <p id="last-updated"></p>
  </header>

  <div class="container">
    <div class="top-story" id="top-story"></div>
    <div class="image-columns" id="image-columns"></div>
    <hr class="divider">
    <div class="links-grid" id="links-grid"></div>
  </div>

  <footer>
    <p>Updated throughout the day</p>
  </footer>

  <script>
    fetch('https://news-worker.circusreportnews.workers.dev/links')
      .then(response => response.json())
      .then(data => {
        document.getElementById('last-updated').textContent =
          'Last updated: ' + new Date(data.lastUpdated).toLocaleString();

        const links = data.links;

        if (links.length > 0) {
          const top = links[0];
          const topDiv = document.getElementById('top-story');
          if (top.image) {
            const imgLink = document.createElement('a');
            imgLink.href = top.url;
            imgLink.target = '_blank';
            const img = document.createElement('img');
            img.src = top.image;
            img.alt = top.headline;
            imgLink.appendChild(img);
            topDiv.appendChild(imgLink);
          }
          const link = document.createElement('a');
          link.href = top.url;
          link.target = '_blank';
          link.textContent = top.headline;
          topDiv.appendChild(link);
        }

        const imageCol = document.getElementById('image-columns');
        const imagePosts = links.slice(1, 4);
        imagePosts.forEach(item => {
          const card = document.createElement('div');
          card.className = 'image-card';

          if (item.image) {
            const imgLink = document.createElement('a');
            imgLink.href = item.url;
            imgLink.target = '_blank';
            const img = document.createElement('img');
            img.src = item.image;
            img.alt = item.headline;
            imgLink.appendChild(img);
            card.appendChild(imgLink);
          } else {
            const placeholder = document.createElement('div');
            placeholder.className = 'no-image';
            placeholder.textContent = 'No image';
            card.appendChild(placeholder);
          }

          const link = document.createElement('a');
          link.href = item.url;
          link.target = '_blank';
          link.textContent = item.headline;
          card.appendChild(link);
          imageCol.appendChild(card);
        });

        const grid = document.getElementById('links-grid');
        links.slice(4).forEach(item => {
          const div = document.createElement('div');
          div.className = 'link-item';
          const prefix = item.emoji ? item.emoji : '&#9654;';
          div.innerHTML = '<a href="' + item.url + '" target="_blank">' + prefix + ' ' + item.headline + '</a>';
          grid.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('top-story').innerHTML =
          '<p>No links yet. Check back soon.</p>';
      });
  </script>

</body>
</html>
